<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Estoque Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-view" class="box">
        <header>
            <h2>SISTEMA DE LOGIN</h2>
            <p>Insira os dados para autenticação</p>
        </header>
        
        <div class="form-group">
            <label for="cargo">Cargo:</label>
            <select id="cargo">
                <option value="Cozinheira">Cozinheira (A)</option>
                <option value="Diretor">Diretor (A)</option>
            </select>

            <input type="email" id="email" placeholder="E-mail profissional">
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="sobrenome" placeholder="Sobrenome">
            <input type="text" id="cpf" placeholder="CPF (apenas números)">

            <div class="terms-container">
                <input type="checkbox" id="termos">
                <label for="termos">Aceito os Termos de Uso</label>
            </div>

            <button id="btn-login" onclick="logar()">Acessar Sistema</button>
        </div>
    </div>

    <div id="cozinha-view" class="box hidden">
        <header>
            <h2>BAIXA DE ALIMENTOS</h2>
            <p>Cozinha: <span id="user-display"></span></p>
        </header>

        <div class="form-group">
            <label for="alimento">Selecione o Alimento:</label>
            <select id="alimento">
                <option value="Arroz">Arroz</option>
                <option value="Feijão">Feijão</option>
            </select>

            <label for="qtd">Quantidade gasta (kg/un):</label>
            <input type="number" id="qtd" placeholder="0.00" step="0.01">

            <button id="btn-baixa" onclick="enviarBaixa()">Registrar Consumo</button>
            <p id="msg" class="success-msg"></p>
            
            <button class="btn-secondary" onclick="location.reload()">Sair do Sistema</button>
        </div>
    </div>

    <div id="diretor-view" class="box hidden" style="max-width: 600px;">
        <header>
            <h2>PAINEL DO DIRETOR</h2>
            <p>Bem-vindo, <span id="admin-display"></span></p>
        </header>
    
        <div class="form-group">
            <div style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #f9f9f9;">
                <h4 style="margin-top: 0; color: #2563eb;">📦 Editar Estoque no Banco</h4>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <select id="edit-alimento">
                        <option value="Arroz">Arroz</option>
                        <option value="Feijão">Feijão</option>
                    </select>
                    <input type="number" id="nova-qtd" placeholder="Nova quantidade total (kg)">
                    <button onclick="atualizarEstoqueBanco()" style="background: #059669;">Salvar Alteração</button>
                </div>
            </div>

            <div style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: white;">
                <h4 style="margin-top: 0; color: #2563eb;">📊 Consumo Acumulado</h4>
                <div style="height: 250px; position: relative; margin-bottom: 20px;">
                    <canvas id="graficoGastos"></canvas>
                </div>
                
                <button onclick="verGastoDoDia()" style="background: #64748b;">🔍 Consultar Gasto de Hoje</button>
                <div id="lista-dia" style="margin-top: 15px; font-size: 0.85rem; text-align: left; max-height: 150px; overflow-y: auto; background: #fff; border: 1px solid #eee; padding: 5px;"></div>
            </div>
            
            <button class="btn-secondary" onclick="location.reload()" style="margin-top: 20px;">Sair do Painel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
